<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex">
  <title>Mini 2D RPG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="game-shell">
    <canvas id="game" width="960" height="540" aria-label="Mini RPG exploration demo"></canvas>
    <div id="dialog" class="dialog hidden">
      <div id="dialog-name" class="dialog-name"></div>
      <div id="dialog-text" class="dialog-text"></div>
      <div class="dialog-next">[F] Next</div>
    </div>

    <div id="mobile-controls">
      <div id="joystick-zone">
        <div id="joystick-base">
          <div id="joystick-knob"></div>
        </div>
      </div>
      <button id="talk-btn" aria-label="Action">Talk</button>
    </div>
  </main>

  <script src="js/Input.js"></script>
  <script src="js/Collision.js"></script>
  <script src="js/Camera.js"></script>
  <script src="js/Dialog.js"></script>
  <script src="js/NPC.js"></script>
  <script src="js/Player.js"></script>
  <script src="js/World.js"></script>
  <script src="js/Game.js"></script>
  <script src="js/Main.js"></script>
</body>
</html>
